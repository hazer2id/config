set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g mouse off
set -g prefix C-b
setw -g mode-key vi
set -g allow-passthrough on # Enables ANSI pass through
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -as terminal-features ',*:RGB'

set -g @bg "#fbf1c7"
set -g @bg0 "#fbf1c7"
set -g @bg0_h "#f9f5d7"
set -g @bg1 "#ebdbb2"
set -g @bg2 "#d5c4a1"
set -g @bg3 "#bdae93"
set -g @bg4 "#a89984"
set -g @fg "#3c3836"
set -g @fg0 "#282828"
set -g @fg1 "#3C3836"
set -g @fg2 "#504945"
set -g @fg3 "#665c54"
set -g @fg4 "#7c6f64"

set -g status-style "fg=#{@fg},bg=#{@bg2}"
set -g status-right "%H:%M %a %d %b"
set -g window-status-current-style "fg=#{@bg},bg=#{@fg}"
set -g window-status-separator " "

# Window
bind-key Up new-window
bind-key Down confirm-before -p "kill-pane #W? (y/n)" kill-pane
bind-key 'q' detach-client

# Pane
bind-key 'z' split-window -h
bind-key 'Z' split-window -v
bind-key 'w' select-pane -t :.+
bind-key "f" resize-pane -L 5
bind-key 'i' resize-pane -D 5
bind-key 'o' resize-pane -U 5
bind-key 'n' resize-pane -R 5

# Move
bind-key Left previous-window
bind-key Right next-window
bind-key Home select-pane -L
bind-key End select-pane -R
bind-key PageUp select-pane -U
bind-key PageDown select-pane -D
bind-key '=' resize-pane -Z

# Copy mode
bind-key 'C-b' copy-mode
bind-key 'p' paste-buffer
bind-key -T copy-mode-vi "f" send -X cursor-left
bind-key -T copy-mode-vi 'i' send -X cursor-down
bind-key -T copy-mode-vi 'o' send -X cursor-up
bind-key -T copy-mode-vi 'n' send -X cursor-right
bind-key -T copy-mode-vi 's' send -X begin-selection
bind-key -T copy-mode-vi 'S' send -X select-line
bind-key -T copy-mode-vi 'c' send -X copy-selection
bind-key -T copy-mode-vi 'Escape' send -X cancel

# Etc
bind-key ':' command-prompt
bind-key j command-prompt -p "join pane from:" "join-pane -h -s '%%'"
bind-key J command-prompt -p "join pane from:" "join-pane -v -s '%%'"

run '~/.tmux/plugins/tpm/tpm'
